name: Deploy to hoster

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_VK_ID: ${{ secrets.AUTH_VK_ID }}
          AUTH_VK_SECRET: ${{ secrets.AUTH_VK_SECRET }}
          AUTH_YANDEX_ID: ${{ secrets.AUTH_YANDEX_ID }}
          AUTH_YANDEX_SECRET: ${{ secrets.AUTH_YANDEX_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 83.69.248.175
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Pin host key to prevent MITM. Generate with: ssh-keyscan -H 83.69.248.175
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          script: |
            set -e
            cd /var/www/garden-manager

            # Load env so DATABASE_URL is available for prisma CLI
            set -a; source .env; set +a

            git pull origin main

            # Full install including devDeps needed for next build
            npm ci
            npx prisma generate

            # Build before migrate — fail-fast before touching DB
            npm run build

            # Apply migrations after successful build
            npx prisma migrate deploy

            # Restart app with updated env
            pm2 restart garden-manager --update-env || pm2 start npm --name garden-manager -- start -- --port 3003
            pm2 save
